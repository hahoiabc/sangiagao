# coturn TURN server config for SanGiaGao WebRTC calls

# Network
listening-port=3478
listening-ip=0.0.0.0

# Realm
realm=sangiagao.vn
server-name=sangiagao.vn

# Authentication (static credentials - simple setup)
lt-cred-mech
user=riceturn:riceturn_secret

# Logging
log-file=stdout
verbose

# Security
no-multicast-peers
no-cli
no-tlsv1
no-tlsv1_1

# Performance
total-quota=100
stale-nonce=600
max-bps=0

# Fingerprint for STUN
fingerprint
