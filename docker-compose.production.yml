##############################################
# Rice Marketplace - Production Stack
##############################################
# Chạy: docker compose -f docker-compose.production.yml --env-file .env.production up -d
# Dừng: docker compose -f docker-compose.production.yml --env-file .env.production down
# Logs: docker compose -f docker-compose.production.yml logs -f [service]

services:
  # ========================
  # PostgreSQL - Database chính
  # ========================
  postgres:
    image: postgres:16-alpine
    container_name: rice_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infras/configs/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - db_backup:/backup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  # ========================
  # Redis - Cache & Sessions
  # ========================
  redis:
    image: redis:7-alpine
    container_name: rice_redis
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy volatile-lru
      --requirepass ${REDIS_PASSWORD}
      --rename-command FLUSHALL ""
      --rename-command FLUSHDB ""
      --rename-command DEBUG ""
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal
    restart: always
    deploy:
      resources:
        limits:
          memory: 300M

  # ========================
  # MongoDB - Chat Messages
  # ========================
  mongodb:
    image: mongo:7
    container_name: rice_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    volumes:
      - mongo_data:/data/db
      - ./infras/configs/mongodb/init.js:/docker-entrypoint-initdb.d/01-init.js:ro
      - db_backup:/backup
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  # ========================
  # MinIO - Object Storage
  # ========================
  minio:
    image: minio/minio:latest
    container_name: rice_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  # ========================
  # Backend API (Go)
  # ========================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rice_backend
    environment:
      APP_ENV: production
      PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_SSL_MODE: disable
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY}
      REFRESH_TOKEN_EXPIRY: ${REFRESH_TOKEN_EXPIRY}
      PHONE_ENCRYPT_KEY: ${PHONE_ENCRYPT_KEY}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: rice-images
      MINIO_USE_SSL: "false"
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
      SMS_PROVIDER: ${SMS_PROVIDER:-mock}
      SMS_API_KEY: ${SMS_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://admin.yourdomain.com}
      RATE_LIMIT_RPS: "30"
      RATE_LIMIT_BURST: "50"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - internal
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  # ========================
  # Chat Service (Phoenix/Elixir)
  # ========================
  chat:
    build:
      context: ./chat
      dockerfile: Dockerfile
    container_name: rice_chat
    environment:
      SECRET_KEY_BASE: ${PHOENIX_SECRET_KEY_BASE}
      JWT_SECRET: ${JWT_SECRET}
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_USER: ${POSTGRES_USER}
      PG_PASSWORD: ${POSTGRES_PASSWORD}
      PG_DATABASE: ${POSTGRES_DB}
      MONGO_URL: "mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/${MONGO_INITDB_DATABASE}?authSource=admin"
      PHX_HOST: ${PHX_HOST:-localhost}
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - internal
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  # ========================
  # Admin Panel (Next.js)
  # ========================
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: rice_admin
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - internal
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  # ========================
  # Nginx - Reverse Proxy
  # ========================
  nginx:
    image: nginx:1.27-alpine
    container_name: rice_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infras/configs/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_data:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - backend
      - admin
      - chat
      - minio
    networks:
      - internal
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M

  # ========================
  # Certbot - SSL Certificates
  # ========================
  certbot:
    image: certbot/certbot
    container_name: rice_certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - internal
    restart: always

  # ========================
  # Database Backup - Daily cron
  # ========================
  db-backup:
    image: alpine:3.19
    container_name: rice_db_backup
    volumes:
      - db_backup:/backup
      - ./infras/scripts/backup.sh:/backup.sh:ro
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      MONGO_HOST: mongodb
      MONGO_PORT: "27017"
      MONGO_USER: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_DB: ${MONGO_INITDB_DATABASE}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    entrypoint: >
      /bin/sh -c '
        apk add --no-cache postgresql16-client mongodb-tools dcron tzdata &&
        cp /usr/share/zoneinfo/Asia/Ho_Chi_Minh /etc/localtime &&
        echo "Asia/Ho_Chi_Minh" > /etc/timezone &&
        chmod +x /backup.sh &&
        echo "0 2 * * * /backup.sh >> /backup/backup.log 2>&1" | crontab - &&
        echo "[$(date)] Backup scheduler started - daily at 02:00 AM" >> /backup/backup.log &&
        crond -f -l 2
      '
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - internal
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  internal:
    name: rice_internal
    driver: bridge
    internal: false

volumes:
  postgres_data:
    name: rice_prod_postgres_data
  redis_data:
    name: rice_prod_redis_data
  mongo_data:
    name: rice_prod_mongo_data
  minio_data:
    name: rice_prod_minio_data
  db_backup:
    name: rice_prod_db_backup
  certbot_data:
    name: rice_prod_certbot_data
  certbot_www:
    name: rice_prod_certbot_www
